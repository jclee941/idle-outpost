name: CI Failure Issues

# When Sanity or Auto Deploy Workflows fails on master, create a
# deduplicated issue. If an open issue already exists for the same
# (workflow, sha) pair, append a comment instead of creating a duplicate.
#
# Replaces the duplicate-prone direct `gh issue create` step in
# auto-deploy.yml that produced issues #18 and #29.

on:
  workflow_run:
    workflows:
      - "Sanity"
      - "Auto Deploy Workflows"
      - "PR Checks"
      - "Gitleaks"
      - "Runtime Health Check"
      - "ELK Health Check"
      - "Downstream Health Check"
      - "Bot Health Monitor"
      - "Drift Detector"
      - "CI Auto-Heal"
    types: [completed]
  schedule:
    # Daily stale-failure-issue sweep: close failure/health issues whose
    # originating workflow has since recovered (latest master run == success).
    - cron: "45 5 * * *"  # 05:45 UTC daily (offset from other crons)
  workflow_dispatch:
    inputs:
      workflow_name:
        description: Workflow name
        required: true
        type: string
      head_sha:
        description: Commit SHA
        required: true
        type: string
      run_id:
        description: Run ID (0 for synthetic)
        required: true
        type: string
      conclusion:
        description: Conclusion (failure or success)
        required: true
        type: string
        default: failure
      dry_run:
        description: Skip actual issue ops
        required: false
        type: boolean
        default: false
      pr_number:
        description: PR number (0 if not applicable)
        required: false
        type: string
        default: '0'

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: ci-failure-issues-${{ github.event.workflow_run.head_sha || inputs.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  triage:
    # The event-driven path handles workflow_run + manual dispatch. The daily
    # schedule is handled by the separate `sweep` job below.
    if: github.event_name != 'schedule'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    # Trigger only on FAILURE conclusion (success → close stale below).
    # workflow_run only fires on default branch by default, which is what we want.
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Compute event
        id: ev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_WORKFLOW_NAME: ${{ inputs.workflow_name }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          INPUT_CONCLUSION: ${{ inputs.conclusion }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number || '0' }}
          EVENT_NAME: ${{ github.event_name }}
          WF_RUN_NAME: ${{ github.event.workflow_run.name }}
          WF_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WF_RUN_ID: ${{ github.event.workflow_run.id }}
          WF_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_RUN_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number || '0' }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            WF_NAME="$INPUT_WORKFLOW_NAME"
            HEAD_SHA="$INPUT_HEAD_SHA"
            RUN_ID="$INPUT_RUN_ID"
            CONCLUSION="$INPUT_CONCLUSION"
            PR_NUMBER="$INPUT_PR_NUMBER"
          else
            WF_NAME="$WF_RUN_NAME"
            HEAD_SHA="$WF_RUN_HEAD_SHA"
            RUN_ID="$WF_RUN_ID"
            CONCLUSION="$WF_RUN_CONCLUSION"
            PR_NUMBER="$WF_RUN_PR_NUMBER"
          fi

          # Validate inputs
          if ! [[ "$HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::Invalid head_sha format: $HEAD_SHA"
            exit 1
          fi
          if ! [[ "$RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid run_id format: $RUN_ID"
            exit 1
          fi
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            PR_NUMBER="0"
          fi
          if [[ "$CONCLUSION" != "success" && "$CONCLUSION" != "failure" && "$CONCLUSION" != "cancelled" && "$CONCLUSION" != "skipped" ]]; then
            echo "::error::Invalid conclusion: $CONCLUSION (must be success, failure, cancelled, or skipped)"
            exit 1
          fi
          # For cancelled/skipped, treat as failure for issue creation purposes
          if [[ "$CONCLUSION" == "cancelled" || "$CONCLUSION" == "skipped" ]]; then
            CONCLUSION="failure"
          fi

          {
            echo "wf_name=$WF_NAME"
            echo "head_sha=$HEAD_SHA"
            echo "run_id=$RUN_ID"
            echo "conclusion=$CONCLUSION"
            echo "short_sha=${HEAD_SHA:0:8}"
            echo "pr_number=$PR_NUMBER"
          } >> "$GITHUB_OUTPUT"

      - name: On success, close any open ci-failure issue for this workflow
        if: steps.ev.outputs.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_NAME: ${{ steps.ev.outputs.wf_name }}
          HEAD_SHA: ${{ steps.ev.outputs.head_sha }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -eu
          # The title pattern is stable so we can dedupe and recover.
          TITLE_PREFIX="[ci] $WF_NAME failed at"
          OPEN_ISSUES=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --state open --label ci-failure --search "in:title \"$TITLE_PREFIX\"" \
            --json number,title --jq '.[] | .number' 2>/dev/null || true)
          if [ -z "$OPEN_ISSUES" ]; then
            echo "::notice::No open ci-failure issue to close for $WF_NAME"
            exit 0
          fi
          for N in $OPEN_ISSUES; do
            if [ "$DRY_RUN" = "true" ]; then
              echo "::notice::DRY-RUN: would close stale ci-failure issue #$N"
              continue
            fi
            gh issue close "$N" --repo "$GITHUB_REPOSITORY" \
              --comment "Resolved by a successful $WF_NAME run on $HEAD_SHA. Auto-closed by jclee-bot." \
              --reason completed \
              || echo "::warning::failed to close #$N; continuing"
          done

      - name: On success, close legacy auto-deploy failure issues
        if: steps.ev.outputs.conclusion == 'success' && steps.ev.outputs.wf_name == 'Auto Deploy Workflows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -eu
          LEGACY_ISSUES=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --state open --search "in:title \"chore: auto-deploy failed on\"" \
            --json number,title --jq '.[] | .number' 2>/dev/null || true)
          if [ -z "$LEGACY_ISSUES" ]; then
            echo "::notice::No legacy auto-deploy failure issues to close"
            exit 0
          fi
          for N in $LEGACY_ISSUES; do
            if [ "$DRY_RUN" = "true" ]; then
              echo "::notice::DRY-RUN: would close legacy auto-deploy issue #$N"
              continue
            fi
            gh issue close "$N" --repo "$GITHUB_REPOSITORY" \
              --comment "Resolved by a successful Auto Deploy Workflows run. Auto-closed by jclee-bot." \
              --reason completed \
              || echo "::warning::failed to close legacy issue #$N; continuing"
          done
      - name: Ensure label exists
        if: steps.ev.outputs.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ci-failure --color B60205 --description "Auto-managed by ci-failure-issues.yml" 2>/dev/null || true
          gh label create automated --color BFD4F2 --description "Auto-managed by jclee-bot" 2>/dev/null || true

      - name: Find or create issue for failure
        if: steps.ev.outputs.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_NAME: ${{ steps.ev.outputs.wf_name }}
          HEAD_SHA: ${{ steps.ev.outputs.head_sha }}
          SHORT_SHA: ${{ steps.ev.outputs.short_sha }}
          RUN_ID: ${{ steps.ev.outputs.run_id }}
          PR_NUMBER: ${{ steps.ev.outputs.pr_number }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -eu
          TITLE="[ci] $WF_NAME failed at $SHORT_SHA"
          # Idempotency: search for an open issue with the SAME title.
          # Compare exact title rather than substring to avoid false matches.
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --state open --label ci-failure \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" 2>/dev/null | head -1 || true)
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$RUN_ID"
          PR_LINE=""
          if [ "$PR_NUMBER" != "0" ] && [ -n "$PR_NUMBER" ]; then
            PR_LINE="- **PR:** #$PR_NUMBER"$'\n'
          fi
          BODY="## CI Failure"$'\n\n'"- **Workflow:** $WF_NAME"$'\n'"- **Commit:** $HEAD_SHA"$'\n'"$PR_LINE- **Run:** $RUN_URL"$'\n\n'"### Action Required"$'\n'"Inspect the failed run and either fix the underlying problem or close this issue if the failure was transient."$'\n\n'"> Auto-managed by jclee-bot (ci-failure-issues.yml)"
          if [ -n "$EXISTING" ]; then
            if [ "$DRY_RUN" = "true" ]; then
              echo "::notice::DRY-RUN: would comment on existing issue #$EXISTING"
              exit 0
            fi
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --body "Another failure for the same workflow+sha. Run: $RUN_URL" \
              || echo "::warning::failed to add dedup comment; continuing"
            echo "::notice::Recorded duplicate failure on existing issue #$EXISTING"
          else
            if [ "$DRY_RUN" = "true" ]; then
              echo "::notice::DRY-RUN: would create new issue: $TITLE"
              exit 0
            fi
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$BODY" \
              --label ci-failure,automated \
              || echo "::warning::failed to create ci-failure issue; non-fatal"
          fi
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure

  # Daily sweep: auto-close stale failure/health issues whose originating
  # workflow has since recovered. Maps each open issue to its workflow file by
  # title pattern, queries that workflow's latest COMPLETED run on the default
  # branch, and closes the issue when the latest run conclusion is success.
  # This is the safety-net layer for issues the event-driven path missed
  # (missed webhooks, renamed workflows, legacy per-run-id-titled issues).
  sweep:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Sweep stale failure/health issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'master' }}
        run: |
          set -euo pipefail
          # Map a title-substring -> workflow file. A stale issue whose title
          # contains the key is auto-closed iff that workflow's latest
          # completed run on the default branch concluded 'success'.
          # Format: '<title-substring>|<workflow-file>'
          MAP="$(printf '%s\n' \
            'Gitleaks Scan Failed|05_gitleaks.yml' \
            'Runtime Health Check failed|30_runtime-health-check.yml' \
            'ELK Health Check Failed|26_elk-health-check.yml' \
            'Downstream Health Check failed|29_downstream-health-check.yml' \
            'Bot Health|28_bot-health-monitor.yml' \
            'CI Auto-Heal failed|60_ci-auto-heal.yml' \
            'Repository Health Check|31_repo-health.yml')"

          # Cache each workflow's latest completed run conclusion.
          latest_conclusion() {
            wf_file="$1"
            # Query-string form forces a GET; -f would make gh send a POST (404).
            gh api "repos/$GITHUB_REPOSITORY/actions/workflows/$wf_file/runs?branch=$DEFAULT_BRANCH&status=completed&per_page=1" \
              --jq '.workflow_runs[0].conclusion // "none"' 2>/dev/null || echo "error"
          }

          # Note: the loop runs in a pipeline subshell, so per-close logging
          printf '%s\n' "$MAP" | while IFS='|' read -r substr wf_file; do
            [ -z "$substr" ] && continue
            # Find open issues whose title contains the substring.
            issues=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
              --search "in:title \"$substr\"" --limit 100 \
              --json number,title --jq '.[].number' 2>/dev/null || true)
            [ -z "$issues" ] && continue
            conclusion=$(latest_conclusion "$wf_file")
            if [ "$conclusion" != "success" ]; then
              echo "::notice::$wf_file latest run conclusion=$conclusion; keeping its open issues"
              continue
            fi
            for n in $issues; do
              if [ "$DRY_RUN" = "true" ]; then
                echo "::notice::DRY-RUN: would close #$n (workflow $wf_file recovered)"
                continue
              fi
              if gh issue close "$n" --repo "$GITHUB_REPOSITORY" \
                --comment "Auto-closed by the stale-failure sweep: $wf_file latest run on $DEFAULT_BRANCH concluded success, so this failure issue is resolved." \
                --reason completed; then
                echo "::notice::Closed stale issue #$n ($wf_file recovered)"
              else
                echo "::warning::failed to close #$n; continuing"
              fi
            done
          done
          echo "::notice::Stale-failure sweep complete"

name: Branch to PR

# When a feat/* fix/* hotfix/* docs/* refactor/* perf/* test/* chore/*
# ci/* security/* build/* style/* revert/* branch is pushed and no
# open PR exists targeting the default branch, open a ready-for-review PR
# with auto-merge label. Skip if author is jclee-bot itself.

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'docs/**'
      - 'refactor/**'
      - 'perf/**'
      - 'test/**'
      - 'chore/**'
      - 'ci/**'
      - 'security/**'
      - 'build/**'
      - 'style/**'
      - 'revert/**'
  workflow_dispatch:
    inputs:
      branch:
        description: Source branch
        required: true
        type: string
      base:
        description: Base branch
        required: false
        type: string
        default: master
      dry_run:
        description: Skip PR creation
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: branch-to-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-ready-pr:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    # Skip pushes from jclee-bot itself or from automated branch creation.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pusher.name != 'jclee-bot' &&
       github.event.pusher.name != 'github-actions[bot]')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'

      - name: Compute PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_BASE: ${{ inputs.base }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            BRANCH="$INPUT_BRANCH"
            BASE="$INPUT_BASE"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            BASE="$DEFAULT_BRANCH"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          # Idempotency: skip if a PR already exists.
          EXISTING=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" --base "$BASE" \
            --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #$EXISTING already exists for $BRANCH -> $BASE"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Extract issue number from branch (pattern: <type>/issue-N-slug).
          ISSUE_NUM=$(echo "$BRANCH" | sed -nE 's|^[^/]+/issue-([0-9]+)-.*|\1|p')
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          # Last commit summary as default title.
          LAST_COMMIT=$(git log -1 --pretty=format:%s "origin/$BRANCH" 2>/dev/null || git log -1 --pretty=format:%s)
          echo "title=$LAST_COMMIT" >> "$GITHUB_OUTPUT"

      - name: LLM branch-to-PR decision (DP-15)
        id: llm
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          BRANCH: ${{ steps.meta.outputs.branch }}
          BASE: ${{ steps.meta.outputs.base }}
          TITLE: ${{ steps.meta.outputs.title }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
        run: |
          set -eu
          if [ "${{ steps.meta.outputs.skip }}" = "true" ]; then
            {
              echo "ok=true"
              echo "action=noop"
              echo "requires_human=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git log --pretty=format:'%s (%h)' -n 10 "origin/${BRANCH}" > "${RUNNER_TEMP}/branch-commits.txt" 2>/dev/null || true
          python3 -c "import json,os; json.dump({'branch':os.environ.get('BRANCH',''),'base':os.environ.get('BASE',''),'title':os.environ.get('TITLE',''),'issue_number':os.environ.get('ISSUE_NUM',''),'commits':open(os.environ['RUNNER_TEMP'] + '/branch-commits.txt', encoding='utf-8').read()}, open(os.environ['RUNNER_TEMP'] + '/branch-to-pr-input.json','w'))"
          python3 scripts/llm_decide.py \
            --decision-type branch-to-pr \
            --input "${RUNNER_TEMP}/branch-to-pr-input.json" \
            --output "$GITHUB_OUTPUT" || true

      - name: Open draft PR
        if: steps.meta.outputs.skip != 'true' && (steps.llm.outputs.ok != 'true' || steps.llm.outputs.action == 'open')
        env:
          # Use GH_PAT (falls back to GITHUB_TOKEN) so the created PR triggers
          # downstream 'pull_request' workflows. PRs opened with the default
          # GITHUB_TOKEN do NOT fire other workflows (GitHub's recursion guard),
          # which left required checks (pr-checks, Gitleaks) never running and
          # auto-merge permanently BLOCKED. With a PAT the checks run and
          # auto-merge actually fires.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.meta.outputs.branch }}
          BASE: ${{ steps.meta.outputs.base }}
          ISSUE_NUM: ${{ steps.meta.outputs.issue_number }}
          TITLE: ${{ steps.meta.outputs.title }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -eu
          # Build PR body.
          BODY="## 변경사항"$'\n\n'"<!-- 자동으로 생성된 PR입니다. 마크다운으로 변경 내용을 설명해주세요. -->"$'\n\n'
          if [ -n "$ISSUE_NUM" ]; then
            BODY="${BODY}Closes #${ISSUE_NUM}"$'\n\n'
          fi
          # Append commit log range vs base branch.
          BODY="${BODY}### 커밋 목록"$'\n'
          # shellcheck disable=SC2129
          {
            git log --pretty=format:'- %s (%h)' "origin/${BASE}..origin/${BRANCH}" 2>/dev/null \
              || git log --pretty=format:'- %s (%h)' -n 10 "origin/${BRANCH}"
          } > /tmp/commits.txt || true
          BODY="${BODY}$(cat /tmp/commits.txt)"
          BODY="${BODY}"$'\n\n'"> Automated by jclee-bot (branch-to-pr.yml)"
          if [ "$DRY_RUN" = "true" ]; then
          echo "::notice::DRY-RUN: would open ready PR $BRANCH -> $BASE"
            echo "title: $TITLE"
            echo "body: $BODY"
            exit 0
          fi
          # Create the PR.
          gh pr create --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" --base "$BASE" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "auto-merge" \
            || echo "::warning::PR creation failed (likely already exists or no diff yet)"

          # Enable auto-merge (squash) so the PR merges itself once all required
          # branch protection checks pass. Branch-to-PR runs only on human pushes
          # (workflow skips jclee-bot and github-actions[bot] actors), so the
          # actual change author is human even though the PR author is
          # github-actions[bot]. Without this step, 13_pr-auto-merge.yml skips
          # bot-authored PRs and the PR never merges automatically.
          PR_URL=$(gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json url --jq .url 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            gh pr merge --auto --squash "$PR_URL" \
              || echo "::warning::auto-merge enable failed (allow_auto_merge disabled, branch protection mismatch, or PR already merged)"
          else
            echo "::warning::could not resolve PR URL for $BRANCH; auto-merge not enabled"
          fi

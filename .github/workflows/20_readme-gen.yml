name: README Generator

on:
  # Manual trigger
  workflow_dispatch:
  # Weekly auto-generation (Sundays 00:00 UTC)
  # Trigger when source/config files change on master
  push:
    branches: [master, main]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/20_readme-gen.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-gen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate_readme:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    name: Generate README.md via CLIProxyAPI
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check out readme generator script
        uses: actions/checkout@v6
        with:
          repository: jclee941/.github
          ref: master
          path: _bot-scripts
          sparse-checkout: |
            scripts/generate_readme.py
          fetch-depth: 1

      - name: Generate README.md
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimax.io/v1
        run: |
          set -eu
          python3 _bot-scripts/scripts/generate_readme.py --repo .

      - name: Normalize generated README (markdownlint --fix)
        # Use the SAME markdownlint-cli version + .markdownlint.json config that
        # 42_reusable-docs-sync.yml enforces, so the generated README passes the
        # Documentation Sync 'markdown-lint' check instead of failing it.
        run: |
          set -eu
          npm install -g markdownlint-cli@0.43.0
          markdownlint --fix --config .markdownlint.json README.md || true

      - name: Check for changes
        id: diff
        run: |
          set -eu
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to README.md"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "README.md changed"
          fi

      - name: Commit and push to branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -eu
          git config user.email "bot@jclee.me"
          git config user.name "github-bot"
          # Re-create the bot branch from the freshly generated state.
          # checkout -B is idempotent across repeated runs (fixed branch name),
          # and --force below handles both the first run (no remote branch yet)
          # and re-runs (existing remote branch) without a 'stale info' lease
          # error. This is a bot-owned branch with the bot as sole writer, and
          # the workflow concurrency group serialises runs, so --force is safe.
          git checkout -B bot/auto-readme-update
          git add README.md
          # No [skip ci]: the PR needs its required checks to run so auto-merge
          # can be satisfied.
          git commit -m "docs: auto-update README.md"
          gh auth setup-git
          git push -u origin bot/auto-readme-update --force
        env:
          # GH_PAT (not GITHUB_TOKEN) so the pushed branch triggers PR checks and
          # auto-merge can fire.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -eu
          # Resolve the repo default branch for the PR base. GITHUB_REF_NAME can be
          # a ref path on some events and is wrong for downstream repos that use
          # `main`; the default branch is always a valid base.
          base_branch=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name' 2>/dev/null || true)
          base_branch=${base_branch:-${GITHUB_REF_NAME:-master}}
          existing=$(gh pr list --head bot/auto-readme-update --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "docs: auto-update README.md" --body "Automated README.md update by jclee-bot."
          else
            gh pr create \
              --title "docs: auto-update README.md" \
              --body "Automated README.md update by jclee-bot." \
              --base "$base_branch" \
              --head bot/auto-readme-update
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -eu
          pr_number=$(gh pr list --head bot/auto-readme-update --json number --jq '.[0].number')
          gh pr merge "$pr_number" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure

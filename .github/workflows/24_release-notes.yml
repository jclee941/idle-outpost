name: Release Notes Generator

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate release notes for'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-notes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          set -eu
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "$TAG" | head -n 1)
          
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="$PREVIOUS_TAG..$TAG"
          fi
          
          {
            echo "## What's Changed in $TAG"
            echo ""
          } > release_notes.md
          
          # Categorize commits
          FEATS=$(git log --pretty=format:"- %s (%h)" "$RANGE" --grep="^feat" 2>/dev/null || true)
          FIXES=$(git log --pretty=format:"- %s (%h)" "$RANGE" --grep="^fix" 2>/dev/null || true)
          DOCS=$(git log --pretty=format:"- %s (%h)" "$RANGE" --grep="^docs" 2>/dev/null || true)
          REFACTORS=$(git log --pretty=format:"- %s (%h)" "$RANGE" --grep="^refactor" 2>/dev/null || true)
          CHORES=$(git log --pretty=format:"- %s (%h)" "$RANGE" --grep="^chore" 2>/dev/null || true)
          
          if [ -n "$FEATS" ]; then
            {
              echo "### ✨ Features"
              echo "$FEATS"
              echo ""
            } >> release_notes.md
          fi
          
          if [ -n "$FIXES" ]; then
            {
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            } >> release_notes.md
          fi
          
          if [ -n "$DOCS" ]; then
            {
              echo "### 📚 Documentation"
              echo "$DOCS"
              echo ""
            } >> release_notes.md
          fi
          
          if [ -n "$REFACTORS" ]; then
            {
              echo "### 🔧 Refactoring"
              echo "$REFACTORS"
              echo ""
            } >> release_notes.md
          fi
          
          if [ -n "$CHORES" ]; then
            {
              echo "### 🧹 Maintenance"
              echo "$CHORES"
              echo ""
            } >> release_notes.md
          fi
          
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$TAG" >> release_notes.md
          
          cat release_notes.md
          
          # Set output for next step
          BODY=$(cat release_notes.md)
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          BODY="${{ steps.notes.outputs.body }}"
          
          # Check if release exists
          EXISTING=$(gh release view "$TAG" --repo "${{ github.repository }}" --json url 2>/dev/null || echo "")
          
          if [ -n "$EXISTING" ]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --notes "$BODY"
            echo "Updated release $TAG"
          else
            gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --notes "$BODY"
            echo "Created release $TAG"
          fi
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure

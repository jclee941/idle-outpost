name: Issue Management
on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled, assigned]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-management
  cancel-in-progress: false

jobs:
  issue-management:
    if: github.event_name != 'push'
    uses: jclee941/.github/.github/workflows/43_reusable-issue-management.yml@master
    secrets: inherit

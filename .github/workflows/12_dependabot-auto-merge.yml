name: Dependabot Auto-Merge

# Auto-approves and enables auto-merge for Dependabot PRs.
# Auto-merge waits for required status checks (configured via branch protection)
# before actually merging.
#
# Merge policy (conservative):
#   - patch + minor updates  -> auto-merge (squash)
#   - github_actions ecosystem -> auto-merge regardless of bump (low blast radius)
#   - major updates outside github_actions -> comment, manual review
#   - unknown update-type    -> comment, manual review (e.g. pip metadata gaps)
#
# Required setup on each repo:
#   - allow_auto_merge=true (Public repos: free; Private: Pro/Team only)
#   - branch protection rule on default branch with required status checks
#     (so auto-merge actually waits for CI before merging)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dependabot:
    if: ${{ github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false }}
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve safe updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.package-ecosystem == 'github_actions' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          APPROVER_LOGIN: github-actions[bot]
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
        run: |
          set -euo pipefail

          approval_id="$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --paginate \
            --jq ".[] | select(.user.login == \"$APPROVER_LOGIN\" and .state == \"APPROVED\") | .id" \
            | tail -n 1)"

          if [[ -n "$approval_id" ]]; then
            echo "::notice::PR $PR_URL is already approved by $APPROVER_LOGIN (review id: $approval_id); skipping approval"
            exit 0
          fi

          if gh pr review --approve "$PR_URL" \
            --body "Auto-approved by dependabot-auto-merge ($DEP_NAMES, $UPDATE_TYPE)"; then
            exit 0
          fi

          status=$?
          approval_id="$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --paginate \
            --jq ".[] | select(.user.login == \"$APPROVER_LOGIN\" and .state == \"APPROVED\") | .id" \
            | tail -n 1)"

          if [[ -n "$approval_id" ]]; then
            echo "::warning::approval command failed, but PR $PR_URL is now approved by $APPROVER_LOGIN (review id: $approval_id); treating as idempotent success"
            exit 0
          fi

          echo "::error::failed to approve $PR_URL"
          exit "$status"

      - name: Enable auto-merge for safe updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.package-ecosystem == 'github_actions' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          auto_merge_enabled="$(gh pr view "$PR_URL" \
            --json autoMergeRequest \
            --jq '.autoMergeRequest != null')"

          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "::notice::auto-merge is already enabled for $PR_URL; skipping"
            exit 0
          fi

          if gh pr merge --auto --squash "$PR_URL"; then
            exit 0
          fi

          status=$?
          auto_merge_enabled="$(gh pr view "$PR_URL" \
            --json autoMergeRequest \
            --jq '.autoMergeRequest != null')"

          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "::warning::auto-merge command failed, but auto-merge is now enabled for $PR_URL; treating as idempotent success"
            exit 0
          fi

          echo "::error::failed to enable auto-merge for $PR_URL"
          exit "$status"

      - name: Self-heal stale BLOCKED PR
        # When auto-merge is enabled and all checks pass but GitHub still
        # reports mergeStateStatus=BLOCKED, the PR's base is stale: it was
        # opened against an older default-branch tip whose workflows produced
        # a now-renamed required check (e.g. bare 'scan' vs 'Gitleaks / scan').
        # Updating the branch re-runs current workflows and clears the block.
        # We never use --admin; branch protection is still enforced.
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.package-ecosystem == 'github_actions' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          state="$(gh pr view "$PR_URL" --json mergeStateStatus,statusCheckRollup \
            --jq '.mergeStateStatus')"
          failed="$(gh pr view "$PR_URL" --json statusCheckRollup \
            --jq '[.statusCheckRollup[]? | select((.conclusion // .state) == "FAILURE")] | length')"
          if [[ "$state" == "BLOCKED" && "$failed" == "0" ]]; then
            echo "::notice::PR $PR_URL is BLOCKED with no failing checks; updating branch to clear stale required-context drift"
            # gh CLI on the runner may predate the `gh pr update-branch`
            # subcommand, so call the REST endpoint directly. Capture the
            # response so genuine failures (auth, 5xx) surface instead of
            # being swallowed; only HTTP 422 (branch already up to date or an
            # un-updatable merge conflict) is a benign, expected outcome.
            # subcommand, so call the REST endpoint directly. Capture the
            # response so genuine failures (auth, 5xx) surface instead of
            # being swallowed; only HTTP 422 (branch already up to date or an
            # un-updatable merge conflict) is a benign, expected outcome.
            if gh api -X PUT "repos/$REPO/pulls/$PR_NUMBER/update-branch" \
              >/tmp/update_branch_out 2>/tmp/update_branch_err; then
              echo "::notice::update-branch succeeded for $PR_URL"
            elif grep -qE 'HTTP 422|already up to date|merge conflict' /tmp/update_branch_err; then
              echo "::notice::update-branch not needed for $PR_URL (already up to date or unmergeable conflict)"
            else
              echo "::error::update-branch failed for $PR_URL"
              cat /tmp/update_branch_err >&2 || true
              exit 1
            fi
          else
            echo "::notice::PR $PR_URL mergeStateStatus=$state failed=$failed; no self-heal needed"
          fi

      - name: Flag major updates for manual review
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' && steps.meta.outputs.package-ecosystem != 'github_actions' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMENT_AUTHOR: github-actions[bot]
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
        run: |
          set -euo pipefail

          marker="<!-- dependabot-auto-merge:manual-review:major -->"
          body="$marker"$'\n'"Major version bump for $DEP_NAMES - manual review required."

          comment_id="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.user.login == \"$COMMENT_AUTHOR\" and (.body | contains(\"$marker\"))) | .id" \
            | tail -n 1)"

          if [[ -n "$comment_id" ]]; then
            echo "::notice::major-update manual-review comment already exists on $PR_URL (comment id: $comment_id); skipping"
            exit 0
          fi

          if gh pr comment "$PR_URL" --body "$body"; then
            exit 0
          fi

          status=$?
          comment_id="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.user.login == \"$COMMENT_AUTHOR\" and (.body | contains(\"$marker\"))) | .id" \
            | tail -n 1)"

          if [[ -n "$comment_id" ]]; then
            echo "::warning::comment command failed, but major-update comment now exists on $PR_URL (comment id: $comment_id); treating as idempotent success"
            exit 0
          fi

          echo "::error::failed to post major-update manual-review comment for $PR_URL"
          exit "$status"

      - name: Flag unknown update type for manual review
        if: ${{ steps.meta.outputs.update-type == '' || steps.meta.outputs.update-type == 'null' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMENT_AUTHOR: github-actions[bot]
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
        run: |
          set -euo pipefail

          marker="<!-- dependabot-auto-merge:manual-review:unknown-update-type -->"
          body="$marker"$'\n'"Dependabot did not report a SemVer update-type for $DEP_NAMES (ecosystem=$ECOSYSTEM). Manual review required."

          comment_id="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.user.login == \"$COMMENT_AUTHOR\" and (.body | contains(\"$marker\"))) | .id" \
            | tail -n 1)"

          if [[ -n "$comment_id" ]]; then
            echo "::notice::unknown-update-type manual-review comment already exists on $PR_URL (comment id: $comment_id); skipping"
            exit 0
          fi

          if gh pr comment "$PR_URL" --body "$body"; then
            exit 0
          fi

          status=$?
          comment_id="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.user.login == \"$COMMENT_AUTHOR\" and (.body | contains(\"$marker\"))) | .id" \
            | tail -n 1)"

          if [[ -n "$comment_id" ]]; then
            echo "::warning::comment command failed, but unknown-update-type comment now exists on $PR_URL (comment id: $comment_id); treating as idempotent success"
            exit 0
          fi

          echo "::error::failed to post unknown-update-type manual-review comment for $PR_URL"
          exit "$status"
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure

name: CI Auto-Heal
on:
  workflow_run:
    workflows: ["Sanity", "PR Checks", "Gitleaks", "CodeQL", "actionlint", "E2E Tests", "Downstream Health Check"]
    types: [completed]
  check_suite:
    types: [completed]
  repository_dispatch:
    types: [ci-auto-heal]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  issues: write
concurrency:
  group: ci-auto-heal
  cancel-in-progress: false
jobs:
  heal:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30
    name: Cross-repo CI auto-heal
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Setup tooling
        run: |
          terraform version 2>/dev/null || echo "terraform not available"
          node --version
          go version 2>/dev/null || echo "go not available"
      - name: Checkout decision helper
        uses: actions/checkout@v6
        with:
          path: _bot-scripts
          fetch-depth: 1
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Auto-heal failed CI across repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          set -eu
          HELPER="$GITHUB_WORKSPACE/_bot-scripts/scripts/llm_decide.py"
          REPOS="account blacklist bug hycu_fsds idle-outpost opencode resume safetywallet splunk terraform tmux"
          HEAL_COUNT=0
          ISSUE_COUNT=0
          for REPO_NAME in $REPOS; do
            FULL="jclee941/$REPO_NAME"
            echo ""
            echo "========================================"
            echo "Checking $FULL"
            echo "========================================"
            FAILED=$(gh run list -R "$FULL" --status failure --limit 3 --json databaseId,name,headBranch,createdAt --jq '.[] | @base64' 2>/dev/null || true)
            if [ -z "$FAILED" ]; then
              echo "   No recent failures"
              continue
            fi
            for RUN_B64 in $FAILED; do
              RUN_JSON=$(echo "$RUN_B64" | base64 -d)
              RUN_ID=$(echo "$RUN_JSON" | jq -r '.databaseId')
              WF_NAME=$(echo "$RUN_JSON" | jq -r '.name')
              BRANCH=$(echo "$RUN_JSON" | jq -r '.headBranch')
              echo ""
              echo "  🚨 Failed: $WF_NAME (run $RUN_ID)"
              if echo "$WF_NAME" | grep -qiE "actionlint|pr-checks|gitleaks|semantic-pr|bot.auto.fix|pr.review|enable.auto.merge|open.ready.pr"; then
                echo "  ⏭ Skipping (managed workflow)"
                continue
              fi
              TEMP_DIR=$(mktemp -d)
              if ! gh repo clone "$FULL" "$TEMP_DIR" -- --depth 1 --branch "$BRANCH" 2>/dev/null; then
                echo "   Failed to clone $FULL"
                rm -rf "$TEMP_DIR"
                continue
              fi
              cd "$TEMP_DIR"
              FIXED=false
              FIX_SUMMARY=""
              HAS_PACKAGE_JSON=false
              HAS_PACKAGE_LOCK=false
              HAS_GO_MOD=false
              HAS_TERRAFORM=false
              HAS_PYTHON=false
              [ -f "package.json" ] && HAS_PACKAGE_JSON=true
              [ -f "package-lock.json" ] && HAS_PACKAGE_LOCK=true
              [ -f "go.mod" ] && HAS_GO_MOD=true
              if ls ./*.tf >/dev/null 2>&1; then HAS_TERRAFORM=true; fi
              if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then HAS_PYTHON=true; fi
              LLM_INPUT="${RUNNER_TEMP}/ci-auto-heal-${REPO_NAME}-${RUN_ID}.json"
              LLM_OUTPUT="${RUNNER_TEMP}/ci-auto-heal-${REPO_NAME}-${RUN_ID}.out"
              export FULL REPO_NAME RUN_ID WF_NAME BRANCH HAS_PACKAGE_JSON HAS_PACKAGE_LOCK HAS_GO_MOD HAS_TERRAFORM HAS_PYTHON LLM_INPUT
              python3 -c "import json,os; json.dump({'repo':os.environ['FULL'],'run_id':os.environ['RUN_ID'],'workflow':os.environ['WF_NAME'],'branch':os.environ['BRANCH'],'files':{'package_json':os.environ['HAS_PACKAGE_JSON']=='true','package_lock':os.environ['HAS_PACKAGE_LOCK']=='true','go_mod':os.environ['HAS_GO_MOD']=='true','terraform':os.environ['HAS_TERRAFORM']=='true','python':os.environ['HAS_PYTHON']=='true'}}, open(os.environ['LLM_INPUT'],'w'))" || true
              python3 "$HELPER" --decision-type ci-auto-heal --input "$LLM_INPUT" --output "$LLM_OUTPUT" || true
              LLM_OK=$(grep '^ok=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              LLM_ACTION=$(grep '^action=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              LLM_COMMAND=$(grep '^command=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              LLM_REQUIRES_HUMAN=$(grep '^requires_human=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              if [ "$LLM_OK" != "true" ] || [ "$LLM_ACTION" != "command" ] || [ "$LLM_REQUIRES_HUMAN" = "true" ]; then
                echo "   LLM did not authorize auto-heal; fail-closed"
              elif [ -f "package.json" ]; then
                if [ "$LLM_COMMAND" = "npm-audit-fix" ] && echo "$WF_NAME" | grep -qiE "audit|dependency|security|npm"; then
                  echo "   Attempting npm audit fix"
                  if npm audit fix --package-lock-only 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- npm audit fix --package-lock-only"
                  elif npm install --package-lock-only 2>/dev/null && npm audit fix --package-lock-only 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- npm audit fix (with package-lock generation)"
                  fi
                fi
                if [ "$LLM_COMMAND" = "npm-lint-fix" ] && echo "$WF_NAME" | grep -qiE "lint|prettier|format|style"; then
                  echo "   Attempting lint/format fixes"
                  if npm run lint:fix 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- npm run lint:fix"
                  elif npx prettier --write . 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- prettier --write"
                  fi
                fi
                if [ "$LLM_COMMAND" = "npm-update" ] && [ "$FIXED" != "true" ] && [ -f "package-lock.json" ]; then
                  echo "   Attempting npm update"
                  if npm update --package-lock-only 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- npm update"
                  fi
                fi
              fi
              if [ "$LLM_OK" = "true" ] && [ "$LLM_ACTION" = "command" ] && [ "$LLM_REQUIRES_HUMAN" != "true" ] && [ -f "go.mod" ]; then
                if [ "$LLM_COMMAND" = "go-mod-tidy" ] && echo "$WF_NAME" | grep -qiE "go|mod|tidy|build|test"; then
                  echo "   Attempting go mod tidy"
                  if go mod tidy 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- go mod tidy"
                  fi
                fi
              fi
              if [ "$LLM_OK" = "true" ] && [ "$LLM_ACTION" = "command" ] && [ "$LLM_REQUIRES_HUMAN" != "true" ] && ls ./*.tf >/dev/null 2>&1; then
                if [ "$LLM_COMMAND" = "terraform-fmt" ] && echo "$WF_NAME" | grep -qiE "terraform|fmt|validate"; then
                  echo "   Attempting terraform fmt"
                  if terraform fmt -recursive 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- terraform fmt -recursive"
                  fi
                fi
              fi
              if [ "$LLM_OK" = "true" ] && [ "$LLM_ACTION" = "command" ] && [ "$LLM_REQUIRES_HUMAN" != "true" ] && { [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; }; then
                if [ "$LLM_COMMAND" = "ruff-fix" ] && echo "$WF_NAME" | grep -qiE "python|lint|ruff|black|format"; then
                  echo "   Attempting Python format fixes"
                  if ruff check --fix . 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- ruff check --fix"
                  fi
                elif [ "$LLM_COMMAND" = "black-format" ] && echo "$WF_NAME" | grep -qiE "python|lint|ruff|black|format"; then
                  echo "   Attempting Python format fixes"
                  if black . 2>/dev/null; then
                    FIXED=true
                    FIX_SUMMARY="$FIX_SUMMARY\n- black ."
                  fi
                fi
              fi
              if [ "$FIXED" = "true" ] && ! git diff --quiet 2>/dev/null; then
                HEAL_BRANCH="chore/auto-heal-$(date +%s)"
                git checkout -b "$HEAL_BRANCH"
                git add .
                git commit -m "chore: auto-heal CI failures [skip ci]" || {
                  echo "   Nothing to commit after fix"
                  cd ..
                  rm -rf "$TEMP_DIR"
                  continue
                }
                git push origin "$HEAL_BRANCH" || {
                  echo "   Push failed"
                  cd ..
                  rm -rf "$TEMP_DIR"
                  continue
                }
                # shellcheck disable=SC2016  # printf format strings must use single quotes
                PR_BODY=$(printf '## Summary\nAuto-healed CI failures.\n- %s\n- Run: https://github.com/%s/actions/runs/%s\n%s\n---\nGenerated by CI Auto-Heal' "$WF_NAME" "$FULL" "$RUN_ID" "$FIX_SUMMARY")
                DEFAULT_BRANCH=$(gh repo view "$FULL" --json defaultBranchRef --jq '.defaultBranchRef.name' 2>/dev/null || echo main)
                gh pr create -R "$FULL" \
                  --title "chore: auto-heal CI failures ($WF_NAME)" \
                  --body "$PR_BODY" \
                  --base "$DEFAULT_BRANCH" \
                  --head "$HEAL_BRANCH" 2>/dev/null || true
                echo "   Created PR for $WF_NAME"
                HEAL_COUNT=$((HEAL_COUNT + 1))
              else
                echo "   Could not auto-heal $WF_NAME"
                ISSUE_TITLE="🚨 CI failure: $WF_NAME"
                EXISTING=$(gh issue list -R "$FULL" --search "$ISSUE_TITLE" --json number --jq 'length' 2>/dev/null || echo "0")
                if [ "$EXISTING" -eq 0 ]; then
                  # shellcheck disable=SC2016  # printf format strings must use single quotes
                  ISSUE_BODY=$(printf '## CI Failure\nWorkflow **`%s`** failed and could not be auto-healed.\n- Run: https://github.com/%s/actions/runs/%s\n- Branch: `%s`' "$WF_NAME" "$FULL" "$RUN_ID" "$BRANCH")
                  gh issue create -R "$FULL" \
                    --title "$ISSUE_TITLE" \
                    --body "$ISSUE_BODY" 2>/dev/null || true
                  echo "   Created issue for $WF_NAME"
                  ISSUE_COUNT=$((ISSUE_COUNT + 1))
                else
                  echo "   Issue already exists"
                fi
              fi
              cd ..
              rm -rf "$TEMP_DIR"
            done
          done
          echo ""
          echo "========================================"
          echo "CI Auto-Heal Summary"
          echo "========================================"
          echo "PRs created: $HEAL_COUNT"
          echo "Issues created: $ISSUE_COUNT"
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          title: 'CI Auto-Heal failed'
          labels: 'ci-health'

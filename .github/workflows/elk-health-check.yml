name: ELK Health Check

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: elk-health-check
  cancel-in-progress: true

jobs:
  elk-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check Elasticsearch connectivity
        run: |
          echo "Checking Elasticsearch at 192.168.50.102:9200..."
          # Note: This runs on GitHub-hosted runner; ELK is internal homelab
          # Use curl with timeout; if unreachable, create an issue
          if curl -sS --connect-timeout 10 -m 15 \
            "http://192.168.50.102:9200/_cluster/health" 2>/dev/null | grep -q '"status"'; then
            echo "✅ Elasticsearch is reachable"
            curl -sS "http://192.168.50.102:9200/_cluster/health?pretty"
          else
            echo "❌ Elasticsearch is unreachable"
            exit 1
          fi

      - name: Check index health
        run: |
          echo "Checking github-bot-logs indices..."
          curl -sS --connect-timeout 10 -m 15 \
            "http://192.168.50.102:9200/_cat/indices/github-bot-logs-*?v&health=yellow,red" 2>/dev/null || true

      - name: Check Filebeat indices
        run: |
          echo "Checking Filebeat indices..."
          curl -sS --connect-timeout 10 -m 15 \
            "http://192.168.50.102:9200/_cat/indices/filebeat-*?v&health=yellow,red" 2>/dev/null || true

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 ELK Health Check Failed: ${context.runId}`;
            const body = `ELK health check workflow failed. Elasticsearch at \`192.168.50.102:9200\` may be down or unreachable.\n\nSee [run logs](${context.payload.repository.html_url}/actions/runs/${context.runId}).`;
            
            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'elk-health',
              state: 'open'
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['elk-health', 'automated']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `ELK health check failed again at ${new Date().toISOString()}. See [run logs](${context.payload.repository.html_url}/actions/runs/${context.runId}).`
              });
            }

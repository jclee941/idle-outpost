name: ELK Setup

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: elk-setup
  cancel-in-progress: true

jobs:
  elk-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup index template
        run: |
          echo "Setting up github-bot-logs index template..."
          curl -sS -X PUT "http://192.168.50.102:9200/_index_template/github-bot-logs" \
            -H 'Content-Type: application/json' \
            -d '{
              "index_patterns": ["github-bot-logs-*"],
              "template": {
                "settings": {
                  "number_of_shards": 1,
                  "number_of_replicas": 0,
                  "refresh_interval": "5s"
                },
                "mappings": {
                  "dynamic_templates": [
                    {
                      "strings_as_keywords": {
                        "match_mapping_type": "string",
                        "mapping": {
                          "type": "keyword",
                          "ignore_above": 1024
                        }
                      }
                    }
                  ]
                }
              },
              "priority": 500,
              "version": 1,
              "_meta": {
                "description": "GitHub bot logs index template"
              }
            }' || echo "Warning: Could not create index template (Elasticsearch may be unreachable)"

      - name: Setup ILM policy
        run: |
          echo "Setting up github-bot-logs ILM policy..."
          curl -sS -X PUT "http://192.168.50.102:9200/_ilm/policy/github-bot-logs" \
            -H 'Content-Type: application/json' \
            -d '{
              "policy": {
                "phases": {
                  "hot": {
                    "min_age": "0ms",
                    "actions": {
                      "rollover": {
                        "max_primary_shard_size": "10gb",
                        "max_age": "7d",
                        "max_docs": 10000000
                      }
                    }
                  },
                  "warm": {
                    "min_age": "7d",
                    "actions": {
                      "shrink": {
                        "number_of_shards": 1
                      },
                      "forcemerge": {
                        "max_num_segments": 1
                      }
                    }
                  },
                  "delete": {
                    "min_age": "30d",
                    "actions": {
                      "delete": {}
                    }
                  }
                }
              }
            }' || echo "Warning: Could not create ILM policy (Elasticsearch may be unreachable)"

      - name: Validate Filebeat config
        run: |
          echo "Validating filebeat.yml..."
          # Filebeat has a test config command, but we don't have filebeat installed
          # Instead, do basic YAML validation
          python3 -c "import yaml; yaml.safe_load(open('filebeat.yml'))"
          echo "✅ filebeat.yml is valid YAML"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 ELK Setup Failed: ${context.runId}`,
              body: `ELK setup workflow failed. See [run logs](${context.payload.repository.html_url}/actions/runs/${context.runId}).`,
              labels: ['elk-health', 'automated']
            });

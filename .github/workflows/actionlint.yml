name: actionlint

# Validates GitHub Actions workflow files for syntax + semantic errors
# (shell injection risks, invalid expressions, dead branches, etc.).
# sanity.yml only does `yaml.safe_load`, which is not enough.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download actionlint
        run: |
          curl -sSfL -o /tmp/actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          chmod +x /tmp/actionlint
          mv /tmp/actionlint ./actionlint
          rm /tmp/actionlint.tar.gz
          ./actionlint --version
        shell: bash

      - name: Run actionlint
        run: |
          mkdir -p .github
          cat > .github/actionlint.yaml << 'EOF'
          self-hosted-runner:
            labels:
              - ".*"
          EOF
          ./actionlint -color -shellcheck= -config-file .github/actionlint.yaml -ignore 'label ".*" is unknown'
        shell: bash

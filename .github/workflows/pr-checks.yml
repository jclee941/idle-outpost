name: PR Checks
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/reusable-pr-checks.yml
    secrets: inherit

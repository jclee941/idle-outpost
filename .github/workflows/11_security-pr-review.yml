name: Security Audit

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: security-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security_review:
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.label.name == 'security-review' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'jclee941'

    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    name: Deep security review via CLIProxyAPI
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check out base branch
        uses: actions/checkout@v7

      - name: Check out pr-agent source from jclee941/.github
        uses: actions/checkout@v7
        with:
          repository: jclee941/.github
          ref: master
          path: pr-agent-src
          fetch-depth: 1

      - name: Set up build cache (NAS-backed on self-hosted)
        uses: ./.github/actions/setup-build-cache

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.PIP_CACHE_DIR || '~/.cache/pip' }}
          key: ${{ runner.os }}-pip-sec-${{ hashFiles('pr-agent-src/pyproject.toml', 'pr-agent-src/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sec-
            ${{ runner.os }}-pip-

      - name: Install pr-agent
        working-directory: pr-agent-src
        run: |
          # Use the venv that setup-python-compatible put on PATH (self-hosted
          # Debian lacks python3-venv/ensurepip, so `python3 -m venv` fails).
          python -m venv .venv || uv venv --seed .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .

      - name: Verify MiniMax connectivity
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          set -e
          HTTP_CODE=$(curl -sS -o /tmp/minimax_test.json -w '%{http_code}' \
            --max-time 15 \
            https://api.minimax.io/v1/models \
            -H "Authorization: Bearer $MINIMAX_API_KEY")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: MiniMax API returned HTTP $HTTP_CODE"
            cat /tmp/minimax_test.json
            exit 1
          fi
          echo "MiniMax API OK (HTTP 200)"

      - name: Run deep security review
        working-directory: pr-agent-src
        env:
          OPENAI__KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI__API_BASE: https://api.minimax.io/v1
          OPENAI_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_BASE_URL: https://api.minimax.io/v1
          LITELLM_LOCAL_MODEL_COST_MAP: "True"
          CONFIG__MODEL: MiniMax-M3
          CONFIG__FALLBACK_MODELS: '["MiniMax-M3"]'
          CONFIG__RESPONSE_LANGUAGE: ko
          CONFIG__AI_TIMEOUT: '300'
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "1000000"
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_REVIEWER__REQUIRE_SECURITY_REVIEW: 'true'
          PR_REVIEWER__REQUIRE_TESTS_REVIEW: 'false'
          PR_REVIEWER__REQUIRE_ESTIMATE_EFFORT_TO_REVIEW: 'false'
          PR_REVIEWER__NUM_MAX_FINDINGS: '10'
          PR_REVIEWER__EXTRA_INSTRUCTIONS: |
            이 리뷰는 심층 보안 감사(Deep Security Audit) 모드입니다.
            다음 카테고리별로 체계적으로 점검하십시오:

            1. 인증/인가(Authentication/Authorization)
            2. 입력 검증(Input Validation)
            3. 비밀 정보(Secrets & Cryptography)
            4. 의존성(Dependencies)
            5. 설정 보안(Configuration)
            6. 비즈니스 로직(Business Logic)

            각 발견 사항에 대해:
            - 심각도: Critical / High / Medium / Low (CVSS 3.1 기준)
            - CWE 카테고리 번호 명시
            - 파일:라인 정확히 명시
            - 재현 시나리오: 공격자가 어떻게 exploit 할 수 있는지 구체적 설명
            - 수정 방안: 즉시 적용 가능한 코드 예시 포함

            거짓 양성(false positive)은 배제하고, 실제 악용 가능한 것만 보고하십시오.
            발견 사항이 없다면 "보안 이슈 없음"이라고 명확히 기술하십시오.

          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: |
            PR 설명은 한국어로, 보안 관점에서 작성하십시오.
            이 변경이 공격 표면에 미치는 영향을 명시하십시오.
        run: |
          .venv/bin/python -m pr_agent.servers.github_action_runner
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          title: 'Security PR Review failed for PR #${{ github.event.pull_request.number }}'

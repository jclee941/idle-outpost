name: Downstream Health Check

# Automated monitoring of critical workflows across all jclee941/* repos.
# Creates a consolidated issue when any downstream repo has failing checks.
# Closes the issue when all repos are green.

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: downstream-health-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    name: Check downstream workflow health

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      # Default-path checkout MUST come first: actions/checkout cleans the
      # workspace root, which would wipe a previously-checked-out subdir.
      - name: Checkout local actions
        uses: actions/checkout@v6
        with:
          repository: jclee941/.github
          ref: master
          fetch-depth: 1

      - name: Checkout repository inventory
        uses: actions/checkout@v6
        with:
          repository: jclee941/.github
          path: .github-inventory

      - name: Check latest workflow runs across all repos
        id: health
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -u

          REPOS=$(ruby -ryaml -e 'puts YAML.load_file(".github-inventory/config/repos.yaml").fetch("repositories").select { |repo| repo.fetch("automation").fetch("health_check") }.map { |repo| repo.fetch("name") }.join(" ")')
          WORKFLOWS=("actionlint" "pr-checks" "gitleaks")
          FAILURES=()

          for REPO in $REPOS; do
            FULL="jclee941/$REPO"
            for WF in "${WORKFLOWS[@]}"; do
              # Tolerate repos/workflows that don't exist: gh exits non-zero
              # ("could not find any workflows named ...") which would abort the
              # step under bash -e. Fall back to empty and skip via the check below.
              LATEST=$(gh run list -R "$FULL" --workflow "$WF" --limit 1 --json conclusion,status,createdAt --jq '.[0]' 2>/dev/null || true)
              if [ -z "$LATEST" ] || [ "$LATEST" = "[]" ]; then
                continue
              fi
              CONCLUSION=$(echo "$LATEST" | jq -r '.conclusion')
              if [ "$CONCLUSION" != "success" ] && [ "$CONCLUSION" != "" ]; then
                FAILURES+=("- $FULL \`$WF\` → conclusion=\`$CONCLUSION\`")
              fi
            done
          done

          if [ ${#FAILURES[@]} -gt 0 ]; then
            {
              echo "failures_found=true"
              echo "count=${#FAILURES[@]}"
              echo "details<<EOF"
              printf '%s\n' "${FAILURES[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "failures_found=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update health-check issue
        if: steps.health.outputs.failures_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          DETAILS: ${{ steps.health.outputs.details }}
        run: |
          set -u

          TITLE="[health-check] Downstream workflow failures detected"

          # Write body to temp file to avoid YAML | conflicts
          BODY_FILE=$(mktemp)
          {
            echo "## Downstream Workflow Health Check Failures"
            echo ""
            echo "The following critical workflows have non-success conclusions in downstream repos:"
            echo ""
            printf '%s\n' "$DETAILS"
            echo ""
            echo "---"
            echo ""
            echo "> Automated by downstream-health-check.yml"
            echo "> Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > "$BODY_FILE"

          BODY=$(cat "$BODY_FILE")
          rm -f "$BODY_FILE"

          # Search for existing open health-check issue
          EXISTING=$(gh issue list -R "${{ github.repository }}" \
            --state open --search "in:title \"$TITLE\"" \
            --json number -q '.[] | .number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" -R "${{ github.repository }}" --body "$BODY"
            gh issue comment "$EXISTING" -R "${{ github.repository }}" --body "Updated: ${{ steps.health.outputs.count }} failures detected at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            gh issue create -R "${{ github.repository }}" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "health-check,automated"
          fi

      - name: Close health-check issue if all green
        if: steps.health.outputs.failures_found == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -u

          TITLE="[health-check] Downstream workflow failures detected"
          EXISTING=$(gh issue list -R "${{ github.repository }}" \
            --state open --search "in:title \"$TITLE\"" \
            --json number -q '.[] | .number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" -R "${{ github.repository }}" \
              --comment "All downstream workflows are now green. Resolved at $(date -u +%Y-%m-%dT%H:%M:%SZ)." \
              --reason completed
          fi
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure

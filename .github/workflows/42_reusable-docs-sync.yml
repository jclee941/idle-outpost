name: Reusable Documentation Sync
on:
  workflow_call:
    inputs:
      is_pull_request:
        description: >-
          Whether the calling workflow was triggered by a pull_request event.
          Reusable workflows run with github.event_name == 'workflow_call',
          so the caller must forward its own event via this input; otherwise
          PR-only jobs would silently skip in downstream repos.
        required: false
        default: false
        type: boolean
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: reusable-docs-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  link-check:
    if: ${{ inputs.is_pull_request }}
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >
            --exclude-all-private
            --timeout 30
            --max-retries 3
            --skip-missing
            --exclude-path 'docs/pr-agent-upstream-README\.md'
            --exclude '\.\./\.\./security/advisories/new'
            --exclude 'cliproxy\.jclee\.me'
            --no-progress
            README.md
            docs/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue for broken links
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            // Stable title (no per-run date) so we can dedupe. Spamming a new
            // issue every failed run floods the tracker; instead comment on
            // the existing open broken-links issue if one exists.
            const title = '[BOT] 문서 링크 깨짐 감지';
            const body = `## \ud83d\udea8 \ubb38\uc11c \ub9c1\ud06c \uae68\uc9d0 \uac10\uc9c0\n\n` +
              `Markdown \ud30c\uc77c\uc758 \ub9c1\ud06c \uc810\uac80 \uc911 \uae68\uc9c4 \ub9c1\ud06c\uac00 \ubc1c\uacac\ub418\uc5c8\uc2b5\ub2c8\ub2e4.\n\n` +
              `- Workflow: ${{ github.workflow }}\n` +
              `- Commit: ${{ github.sha }}\n` +
              `- Branch: ${{ github.ref }}\n` +
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n` +
              `> \uc790\ub3d9 \uc0dd\uc131\ub428 (Documentation Sync Workflow)`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links',
              per_page: 100,
            });
            // Exclude PRs (issues.listForRepo can include pull requests) and
            // match the exact stable title.
            const match = existing.data.find(i => !i.pull_request && i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: body,
              });
              core.notice(`Recorded broken-link recurrence on existing issue #${match.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['documentation', 'bot', 'broken-links'],
              });
              core.notice('Created new broken-links issue');
            }

  private-ip-check:
    # Detect hardcoded RFC 1918 private IPs in Markdown docs. Runs against
    # downstream repos too: they call this reusable workflow via the central
    # `@master` reference, so edits here propagate without re-deploy. The
    # detector script is pulled from jclee941/.github so downstream repos need
    # not vendor it.
    if: ${{ inputs.is_pull_request }}
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout local actions (workspace root)
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          path: pr

      - name: Checkout detector script (from jclee941/.github)
        uses: actions/checkout@v6
        with:
          repository: jclee941/.github
          ref: master
          path: tooling
          sparse-checkout: |
            scripts/check_private_ips.py
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'

      - name: Scan Markdown for hardcoded private IPs
        run: |
          set -eu
          python tooling/scripts/check_private_ips.py pr \
            2> ip-report.txt || EXIT=$?
          cat ip-report.txt || true
          if [ "${EXIT:-0}" -ne 0 ]; then
            echo "::error::Hardcoded private IP(s) found in Markdown docs. See log above."
            exit 1
          fi


  markdown-lint:
    if: ${{ inputs.is_pull_request }}
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install markdownlint
        # Pin the version: unpinned markdownlint-cli auto-upgrades and new
        # default rules (e.g. MD060 table-style, MD056) retroactively fail
        # the whole repo's existing docs. Pin + explicit config keeps lint
        # deterministic across runs.
        run: npm install -g markdownlint-cli@0.43.0

      - name: Lint Markdown files
        run: |
          set -eu
          markdownlint '**/*.md' \
            --config .markdownlint.json \
            --ignore node_modules \
            --ignore .venv \
            --ignore '**/pr-agent-upstream-README.md'

  readme-sync-check:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    if: ${{ inputs.is_pull_request }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check README sync
        uses: actions/github-script@v9
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const changedFiles = files.map(f => f.filename);
            const hasCodeChanges = changedFiles.some(f => 
              f.endsWith('.py') || f.endsWith('.js') || f.endsWith('.ts') || 
              f.endsWith('.go') || f.endsWith('.rs') || f.endsWith('.java')
            );
            const hasConfigChanges = changedFiles.some(f =>
              f.endsWith('.toml') || f.endsWith('.yaml') || f.endsWith('.yml') ||
              f.endsWith('.json') || f.includes('.env')
            );
            const hasReadmeChange = changedFiles.some(f => f.toLowerCase().includes('readme'));
            const hasDocChange = changedFiles.some(f => 
              f.startsWith('docs/') || f.endsWith('.md')
            );
            
            const warnings = [];
            
            if (hasCodeChanges && !hasReadmeChange && !hasDocChange) {
              warnings.push('⚠️ 코드 변경이 있지만 README.md나 문서 업데이트가 없습니다. 새 기능/API 변경 시 문서 업데이트를 고려하세요.');
            }
            
            if (hasConfigChanges && !hasReadmeChange) {
              warnings.push('⚠️ 설정 파일 변경이 있지만 README 업데이트가 없습니다. 설정 예시나 사용법 문서를 업데이트하세요.');
            }
            
            if (warnings.length > 0) {
              const body = `## 📚 문서 현행화 체크\n\n` +
                warnings.join('\n\n') + '\n\n' +
                `> 자동 생성됨 (Documentation Sync Workflow)`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  api-docs-check:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    if: ${{ inputs.is_pull_request }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check API documentation
        uses: actions/github-script@v9
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const changedFiles = files.map(f => f.filename);
            
            // Check for API route changes
            const hasApiChanges = changedFiles.some(f =>
              f.includes('route') || f.includes('api') || f.includes('endpoint') ||
              f.includes('handler') || f.includes('controller')
            );
            
            const hasApiDocs = changedFiles.some(f =>
              f.includes('openapi') || f.includes('swagger') || 
              f.includes('api-doc') || (f.startsWith('docs/') && f.includes('api'))
            );
            
            if (hasApiChanges && !hasApiDocs) {
              const body = `## 🔌 API 문서 체크\n\n` +
                `⚠️ API 관련 코드 변경이 있지만 API 문서 업데이트가 없습니다.\n\n` +
                `변경된 파일:\n` +
                changedFiles.filter(f => f.includes('route') || f.includes('api') || f.includes('endpoint')).map(f => `- \`${f}\``).join('\n') + '\n\n' +
              `OpenAPI/Swagger 명세나 API 문서를 업데이트했는지 확인하세요.\n\n` +
                `> 자동 생성됨 (Documentation Sync Workflow)`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
